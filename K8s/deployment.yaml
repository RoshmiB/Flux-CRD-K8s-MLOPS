apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-api
  namespace: ml-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-api
  template:
    metadata:
      labels:
        app: ml-api
    spec:
      containers:
        - name: ml-app
          image: 725490567891.dkr.ecr.us-west-2.amazonaws.com/ml-app:v1
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi